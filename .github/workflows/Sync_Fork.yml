name: Fork Sync

            
on:
  schedule:
    - cron: '* * */5 * *' # every 5 days
  workflow_dispatch: # on button click

jobs:
  sync:

    runs-on: ubuntu-latest

    steps:
      - uses: tgymnich/fork-sync@v2.0.10
        with:
          owner: bia-pain-bache
          base: main
          head: main
